name: Keep backend awake

# Pings the Render backend health endpoint so the free instance doesn't sleep.
# Runs every 10 minutes (GitHub may delay scheduled runs slightly under load).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          echo "Pinging backend at $(date -u)"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://pa-copliot.onrender.com/api/health)
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Health check did not return 200 (got $code) — instance may have been cold-starting."
          fi
